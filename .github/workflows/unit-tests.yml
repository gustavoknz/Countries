name: Unit Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests and generate coverage report
        run: ./gradlew test jacocoFullReport

      - name: Verify Module Graph is up to date
        run: |
          ./gradlew generateModuleGraph
          if [ -n "$(git diff MODULE_GRAPH.md)" ]; then
            echo "Error: MODULE_GRAPH.md is out of sync. Please run './gradlew generateModuleGraph' locally and commit the changes."
            git diff MODULE_GRAPH.md
            exit 1
          fi
