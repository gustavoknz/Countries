complexity:
  active: true
  CyclomaticComplexMethod:
    active: true
    threshold: 15
  LongMethod:
    active: true
    threshold: 100
  LongParameterList:
    active: true
    functionThreshold: 10
    constructorThreshold: 10
  LargeClass:
    active: true
    threshold: 200
  TooManyFunctions:
    active: true
    thresholdInFiles: 20
    thresholdInClasses: 12
    thresholdInInterfaces: 12
    thresholdInObjects: 12

naming:
  active: true
  FunctionNaming:
    active: true
    functionPattern: '[a-z][a-zA-Z0-9]*'
    excludeClassPattern: '.*Test'
    ignoreAnnotated:
      - 'androidx.compose.runtime.Composable'
  MatchingDeclarationName:
    active: true

style:
  active: true
  MagicNumber:
    active: true
    ignoreNumbers:
      - '0'
      - '1'
      - '2'
      - '100'
      - '200'
      - '400'
      - '500'
    ignoreConstantDeclaration: true
    ignoreEnums: true
  UnusedPrivateMember:
    active: true
    ignoreAnnotated:
      - 'androidx.compose.runtime.Composable'
      - 'androidx.compose.ui.tooling.preview.Preview'

performance:
  active: true
  SpreadOperator:
    active: false

formatting:
  active: true
  android: true
  autoCorrect: true

custom-rules:
  active: true
  ViewModelDependencyRule:
    active: true
