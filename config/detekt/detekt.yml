complexity:
  active: true
  CyclomaticComplexMethod:
    active: true
    threshold: 15
  LongMethod:
    active: true
    threshold: 100
  LongParameterList:
    active: true
    functionThreshold: 10
    constructorThreshold: 10
  LargeClass:
    active: true
    threshold: 200

naming:
  active: true
  FunctionNaming:
    active: true
    functionPattern: '[a-z][a-zA-Z0-9]*'
    excludeClassPattern: '.*Test'
    ignoreAnnotated:
      - 'androidx.compose.runtime.Composable'

style:
  active: true
  MagicNumber:
    active: true
    ignoreNumbers:
      - '-1'
      - '0'
      - '1'
      - '2'
    ignoreConstantDeclaration: true
    ignoreAnnotation: true
    ignoreEnums: true

formatting:
  active: true
  android: true
  autoCorrect: true

custom-rules:
  active: true
  ViewModelDependencyRule:
    active: true
